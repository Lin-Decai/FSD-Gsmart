# 路径规划器参数
path_generator:
  ros__parameters:
    car_state_topic_name: "/estimation/slam/state"
    transform_matrix_topic_name: "/transform_matrix"
    path_generate_topic_name: "/planning/ref_path"
    ref_path_topic_name: "/visual/ref_path"

    # 轨迹生成参数
    desire_vel: 3.0
    car_length: 1.88
    interval: 0.05
    forward_distance: 15.0
    circle_radius: 9.125
    max_lat_acc: 3.0

    # 规划控制参数
    N: 40
    dt: 0.04
    initial_velocity: 2.0
    simulation: false
    node_rate: 100
